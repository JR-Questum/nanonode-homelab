# ==========================================================
# Global variables — shared across all hosts
# ==========================================================

# Your default SSH user for all machines
ansible_user: root

# Private key for SSH access 
ansible_ssh_private_key_file: ~/.ssh/id_rsa
ansible_ssh_public_key_path: ~/.ssh/id_ed25519.pub

# Global timezone for all Debian-based nodes
system_timezone: "Europe/Brussels"

# Default repositories for Proxmox nodes
proxmox_repo: "no-subscription"

# Enable nested virtualization for suitable CPUs
enable_nested_virt: true